<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <title>Teste Validador de Assinatura</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 900px;
      margin: 40px auto;
      padding: 0 20px;
      color: #172033;
      background: #f6f8fb;
    }
    .card {
      background: #fff;
      border: 1px solid #d9e1ef;
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(20, 40, 80, .08);
    }
    h1 {
      margin-top: 0;
      font-size: 26px;
    }
    input, button {
      font-size: 16px;
    }
    button {
      margin-top: 16px;
      padding: 12px 18px;
      border: 0;
      border-radius: 10px;
      background: #0b5fff;
      color: #fff;
      cursor: pointer;
    }
    pre {
      margin-top: 20px;
      padding: 16px;
      border-radius: 10px;
      background: #101828;
      color: #e6edf7;
      overflow: auto;
      white-space: pre-wrap;
    }
    .note {
      margin-top: 12px;
      font-size: 14px;
      color: #5b6577;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Teste do validador de assinatura</h1>

    <p>Envie um PDF para testar a rota <code>/api/validate-signature</code>.</p>

    <input id="file" type="file" accept="application/pdf,.pdf">

    <br>

    <button onclick="testar()">Testar assinatura</button>

    <p class="note">
      Esta página serve apenas para teste técnico do microserviço Java.
    </p>

    <pre id="resultado">Aguardando arquivo...</pre>
  </div>

  <script>
    async function testar() {
      const input = document.getElementById('file');
      const resultado = document.getElementById('resultado');

      if (!input.files.length) {
        resultado.textContent = 'Selecione um PDF antes de testar.';
        return;
      }

      const formData = new FormData();
      formData.append('file', input.files[0]);

      resultado.textContent = 'Enviando arquivo e aguardando resposta...';

      try {
        const response = await fetch('/api/validate-signature', {
          method: 'POST',
          body: formData
        });

        const text = await response.text();

        try {
          resultado.textContent = JSON.stringify(JSON.parse(text), null, 2);
        } catch (e) {
          resultado.textContent = text;
        }
      } catch (err) {
        resultado.textContent = 'Erro ao chamar o serviço: ' + err.message;
      }
    }
  </script>
</body>
</html>
